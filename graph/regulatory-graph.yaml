edge_types:
  requires:
    description: Blocking dependency — node cannot start until predecessor completes
    enforcement: block
  enables:
    description: Non-blocking — predecessor output is used if available, but node can start without it
    enforcement: warn
  validates:
    description: Quality gate — checkpoint that must pass before downstream nodes
    enforcement: block
