schema_version: 1
graph_id: csp-regulatory-pipeline
name: Clinical Trial Statistical Programming Pipeline
description: >
  Full regulatory workflow from protocol/SAP review through eCTD submission. Nodes are organized into
  7 layers with typed dependency edges.
global_skills:
- /workflow
- /workflow-status
- /data-quality
nodes:
- id: sap-review
  name: SAP Review & Interpretation
  layer: 0
  description: >
    Review the Statistical Analysis Plan. Extract endpoint definitions, analysis populations, statistical
    methods, and TFL shell specifications.
  skills_bound:
  - /sap-parser
  mcps_bound: []
  inputs_required:
  - type: document
    name: Statistical Analysis Plan (SAP)
    format: pdf|docx
  outputs_produced:
  - type: specification
    name: Parsed SAP specifications
    format: yaml
    description: Machine-readable endpoints, populations, methods
    path_pattern: specs/sap-parsed.yaml
  regulatory_refs:
  - 'ICH E9: Statistical Principles for Clinical Trials'
  - 'ICH E3: Structure and Content of Clinical Study Reports'
  dependencies: []
  evaluation_criteria:
    mandatory:
    - All primary and secondary endpoints extracted
    - Analysis populations defined (ITT, mITT, PP, Safety)
    - Statistical methods catalogued per endpoint
    recommended:
    - Subgroup analyses identified
    - Multiplicity adjustment strategy documented
  triggers:
  - SAP
  - statistical analysis plan
  - endpoints
  - analysis populations
  - ITT
  - mITT
  - safety population
  - primary endpoint
  - secondary endpoint
  - statistical methods
  - TFL shells
  - multiplicity
  context_prompt: 'Parse SAP to extract endpoints, populations (ITT/mITT/PP/Safety), statistical methods,
    and TFL shell specs. Output: machine-readable SAP YAML.'
- id: protocol-setup
  name: Protocol & Study Setup
  layer: 0
  description: >
    Configure study-level metadata: study ID, therapeutic area, phases, treatment arms, visit schedule,
    randomization scheme.
  skills_bound:
  - /study-setup
  mcps_bound: []
  inputs_required:
  - type: document
    name: Study protocol
    format: pdf|docx
  outputs_produced:
  - type: specification
    name: Study configuration
    format: yaml
    description: Study-level metadata and visit/treatment structure
    path_pattern: specs/study-config.yaml
  regulatory_refs:
  - 'ICH E6(R2): Good Clinical Practice'
  dependencies: []
  evaluation_criteria:
    mandatory:
    - Study ID and phase correctly set
    - Treatment arms and visit schedule defined
    recommended:
    - Randomization scheme documented
  triggers:
  - protocol
  - study setup
  - study ID
  - therapeutic area
  - phase
  - treatment arms
  - visit schedule
  - randomization
  - study design
  - study configuration
  - CRF
  context_prompt: 'Configure study metadata: ID, phase, arms, visit schedule, randomization scheme. Output:
    study configuration YAML.'
- id: spec-creation
  name: Specification Creation
  layer: 0
  description: >
    Create or review mapping specifications: SDTM mapping spec, ADaM derivation spec, TFL shell specs.
    These drive all downstream work.
  skills_bound:
  - /spec-builder
  - /spec-reviewer
  mcps_bound:
  - cdisc-library
  inputs_required:
  - type: specification
    name: Parsed SAP specifications
    format: yaml
  - type: specification
    name: Study configuration
    format: yaml
  outputs_produced:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
    path_pattern: specs/sdtm-mapping-spec.xlsx
  - type: specification
    name: ADaM derivation specification
    format: xlsx|yaml
    path_pattern: specs/adam-derivation-spec.xlsx
  - type: specification
    name: TFL shell specifications
    format: xlsx|docx
    path_pattern: specs/tfl-shells.xlsx
  regulatory_refs:
  - CDISC SDTM IG v3.4
  - CDISC ADaM IG v1.3
  dependencies:
  - node: sap-review
    edge_type: requires
  - node: protocol-setup
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - SDTM mapping spec covers all collected CRF variables
    - ADaM spec covers all SAP endpoints
    - TFL shells match SAP appendix
    recommended:
    - Specs reviewed and signed off
  triggers:
  - mapping specification
  - SDTM spec
  - ADaM spec
  - TFL spec
  - derivation spec
  - specification
  - mapping spec
  - spec creation
  - mapping document
  - programming spec
  - spec review
  context_prompt: Create SDTM mapping spec, ADaM derivation spec, and TFL shell specs from SAP and study
    config. Drives all downstream programming.
- id: edc-extract
  name: EDC Data Extraction
  layer: 1
  description: >
    Extract raw clinical data from the Electronic Data Capture system. Convert to working format (CSV/SAS7BDAT).
    Document extraction date and data cut criteria.
  skills_bound:
  - /data-extract
  mcps_bound: []
  inputs_required:
  - type: specification
    name: Study configuration
    format: yaml
  outputs_produced:
  - type: dataset
    name: Raw EDC datasets
    format: csv|sas7bdat
    description: One file per CRF form/domain
    path_pattern: data/raw/
  - type: metadata
    name: Extraction manifest
    format: yaml
    description: Extraction timestamp, data cut date, row counts
    path_pattern: data/raw/extraction-manifest.yaml
  regulatory_refs:
  - '21 CFR Part 11: Electronic Records'
  dependencies:
  - node: protocol-setup
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All CRF forms extracted
    - Extraction manifest documents data cut date
    - Row counts verified against EDC
    recommended:
    - Data exported in both CSV and SAS7BDAT formats
  triggers:
  - EDC
  - data extraction
  - extract data
  - raw data
  - data cut
  - CRF data
  - clinical data
  - Rave
  - Medidata
  - InForm
  - data export
  - SAS7BDAT
  context_prompt: 'Extract raw clinical data from EDC system. Output: CSV/SAS7BDAT files per CRF form
    + extraction manifest with data cut date.'
- id: crf-validation
  name: CRF Annotation & Validation
  layer: 1
  description: >
    Validate that CRF fields align with CDASH standards and SDTM mapping specifications. Create annotated
    CRF linking each field to its target SDTM variable.
  skills_bound:
  - /crf-annotator
  - /crf-validator
  mcps_bound:
  - cdisc-library
  inputs_required:
  - type: document
    name: Blank CRF
    format: pdf
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  outputs_produced:
  - type: document
    name: Annotated CRF
    format: pdf
    description: CRF with SDTM variable annotations
    path_pattern: docs/acrf-draft.pdf
  regulatory_refs:
  - CDISC CDASH v2.2
  - FDA Study Data Technical Conformance Guide
  dependencies:
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - Every CRF field annotated with target SDTM domain.variable
    - No unmapped fields without documented justification
    recommended:
    - CDASH compliance verified for field naming
  triggers:
  - CRF
  - case report form
  - annotated CRF
  - aCRF
  - CRF annotation
  - CDASH
  - CRF validation
  - CRF fields
  - CRF mapping
  context_prompt: 'Annotate blank CRF with SDTM variable targets per CDASH. Output: annotated CRF (draft)
    linking each field to SDTM domain.variable.'
- id: raw-data-validation
  name: Raw Data Quality Checks
  layer: 1
  description: >
    Validate raw data integrity: variable types, missing values, range checks, cross-form consistency,
    duplicate detection.
  skills_bound:
  - /data-validator
  - /quality-report
  mcps_bound:
  - data-quality
  inputs_required:
  - type: dataset
    name: Raw EDC datasets
    format: csv|sas7bdat
  - type: metadata
    name: Extraction manifest
    format: yaml
  outputs_produced:
  - type: report
    name: Data quality report
    format: html|pdf
    path_pattern: reports/data-quality-report.html
  - type: dataset
    name: Validated raw datasets
    format: csv|sas7bdat
    path_pattern: data/validated/
  regulatory_refs:
  - 'ICH E6(R2): Data Management'
  dependencies:
  - node: edc-extract
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All datasets pass type/format validation
    - Duplicate records identified and documented
    - Quality report generated
    recommended:
    - Range checks applied per protocol-defined limits
  triggers:
  - data quality
  - raw data check
  - data validation
  - missing values
  - duplicate records
  - range check
  - data integrity
  - variable types
  - data cleaning
  context_prompt: 'Validate raw data: types, missing values, range checks, duplicates, cross-form consistency.
    Output: quality report + validated datasets.'
- id: data-reconciliation
  name: Data Reconciliation
  layer: 1
  description: >
    Reconcile data between sources: EDC vs external labs, SAE vs AE,  randomization vs treatment. Document
    discrepancies.
  skills_bound:
  - /data-reconciler
  mcps_bound: []
  inputs_required:
  - type: dataset
    name: Validated raw datasets
    format: csv|sas7bdat
  outputs_produced:
  - type: report
    name: Reconciliation report
    format: html|pdf
    path_pattern: reports/reconciliation-report.html
  regulatory_refs:
  - 'ICH E6(R2): Data Management'
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All cross-source discrepancies documented
    recommended:
    - Discrepancy resolution tracked
  triggers:
  - reconciliation
  - reconcile
  - data reconciliation
  - cross-source
  - EDC vs lab
  - SAE reconciliation
  - lab reconciliation
  context_prompt: 'Reconcile data across sources: EDC vs external labs, SAE vs AE, randomization vs treatment.
    Output: discrepancy report.'
- id: sdtm-dm-mapping
  name: SDTM DM Domain Mapping
  layer: 2
  description: >
    Map raw demographics data to SDTM DM domain per CDISC SDTM IG v3.4. Derive RFSTDTC, RFENDTC, ARM,
    ACTARM, ARMCD, ACTARMCD, AGE, AGEU, SEX, RACE, ETHNIC, COUNTRY.
  skills_bound:
  - /sdtm-dm-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  - cdisc-library
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw demographics data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: DM domain (dm.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/dm.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.1
  - FDA Study Data Technical Conformance Guide
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All required DM variables present per SDTM IG
    - USUBJID uniquely identifies each subject
    - Controlled terminology matches CDISC CT
    recommended:
    - P21 validation returns 0 warnings
  triggers:
  - DM
  - demographics
  - DM domain
  - USUBJID
  - AGE
  - SEX
  - RACE
  - ETHNIC
  - ARM
  - ACTARM
  - RFSTDTC
  - RFENDTC
  - COUNTRY
  - subject demographics
  - demographic mapping
  context_prompt: 'Map raw demographics → SDTM DM (dm.xpt). Key vars: USUBJID, AGE, SEX, RACE, ARM, RFSTDTC.
    Controlled terminology required.'
- id: sdtm-ae-mapping
  name: SDTM AE Domain Mapping
  layer: 2
  description: >
    Map adverse event data to SDTM AE domain. Derive AETERM, AEDECOD (MedDRA), AEBODSYS, AESEV, AESER,
    AEREL, AEOUT, timing variables.
  skills_bound:
  - /sdtm-ae-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  - cdisc-library
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw adverse event data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: AE domain (ae.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/ae.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.2
  - MedDRA coding guidelines
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All AE records coded with MedDRA PT and SOC
    - Timing variables (AESTDTC, AEENDTC) in ISO 8601
    - AESER, AEREL populated for all records
    recommended:
    - AEGRPID used for grouping related events
  triggers:
  - AE
  - adverse event
  - adverse events
  - AE domain
  - AETERM
  - AEDECOD
  - MedDRA
  - AEBODSYS
  - AESEV
  - AESER
  - AEREL
  - AEOUT
  - treatment-emergent
  - serious adverse event
  - SAE
  context_prompt: 'Map adverse events → SDTM AE (ae.xpt). MedDRA coding required. Key vars: AETERM, AEDECOD,
    AEBODSYS, AESEV, AESER, AEREL.'
- id: sdtm-lb-mapping
  name: SDTM LB Domain Mapping
  layer: 2
  description: >
    Map lab data to SDTM LB domain. Handle LBTEST, LBTESTCD, LBORRES, LBORRESU, LBSTRESC, LBSTRESN, LBSTRESU,
    reference ranges, units.
  skills_bound:
  - /sdtm-lb-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  - cdisc-library
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw laboratory data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: LB domain (lb.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/lb.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.3
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - Standard units (LBSTRESU) derived with conversion factors
    - Reference ranges (LBORNRLO, LBORNRHI) populated
    - LBTESTCD matches CDISC controlled terminology
    recommended:
    - LBNRIND derived from reference ranges
  triggers:
  - LB
  - lab
  - laboratory
  - lab data
  - LB domain
  - LBTEST
  - LBTESTCD
  - LBORRES
  - LBSTRESN
  - LBSTRESU
  - reference range
  - LBNRIND
  - hematology
  - chemistry
  - urinalysis
  context_prompt: 'Map laboratory data → SDTM LB (lb.xpt). Unit conversion, reference ranges. Key vars:
    LBTEST, LBSTRESN, LBSTRESU, LBNRIND.'
- id: sdtm-vs-mapping
  name: SDTM VS Domain Mapping
  layer: 2
  description: >
    Map vital signs data to SDTM VS domain. Handle VSTEST, VSTESTCD, VSORRES, VSORRESU, VSSTRESC, VSSTRESN,
    VSSTRESU, positions.
  skills_bound:
  - /sdtm-vs-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw vital signs data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: VS domain (vs.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/vs.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.3
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - VSTESTCD matches CDISC controlled terminology
    - Standard units derived
    recommended:
    - Position (VSPOS) captured where applicable
  triggers:
  - VS
  - vital signs
  - vitals
  - VS domain
  - blood pressure
  - heart rate
  - temperature
  - weight
  - height
  - BMI
  - VSTEST
  - VSTESTCD
  - VSSTRESN
  context_prompt: 'Map vital signs → SDTM VS (vs.xpt). Key vars: VSTEST, VSTESTCD, VSSTRESN, VSSTRESU,
    VSPOS. Standard unit conversion.'
- id: sdtm-cm-mapping
  name: SDTM CM Domain Mapping
  layer: 2
  description: >
    Map concomitant medication data to SDTM CM domain. Handle CMTRT, CMDECOD (WHODrug), CMCAT, CMINDC,
    timing, dose variables.
  skills_bound:
  - /sdtm-cm-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw concomitant medication data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: CM domain (cm.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/cm.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.2
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - WHODrug coding applied (CMDECOD)
    - ATC classification populated
    recommended:
    - Prior vs concomitant flag derived if required
  triggers:
  - CM
  - concomitant medication
  - conmeds
  - CM domain
  - CMTRT
  - CMDECOD
  - WHODrug
  - ATC
  - medication
  - drug coding
  - prior medication
  - concomitant therapy
  context_prompt: 'Map concomitant medications → SDTM CM (cm.xpt). WHODrug coding required. Key vars:
    CMTRT, CMDECOD, ATC class.'
- id: sdtm-mh-mapping
  name: SDTM MH Domain Mapping
  layer: 2
  description: >
    Map medical history data to SDTM MH domain. Handle MHTERM, MHDECOD (MedDRA), MHBODSYS, MHCAT, timing
    variables.
  skills_bound:
  - /sdtm-mh-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw medical history data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: MH domain (mh.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/mh.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.2
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - MedDRA coding applied
    recommended:
    - MHCAT categorization consistent
  triggers:
  - MH
  - medical history
  - MH domain
  - MHTERM
  - MHDECOD
  - past medical history
  - pre-existing condition
  - MHBODSYS
  context_prompt: 'Map medical history → SDTM MH (mh.xpt). MedDRA coding required. Key vars: MHTERM, MHDECOD,
    MHBODSYS.'
- id: sdtm-ex-mapping
  name: SDTM EX Domain Mapping
  layer: 2
  description: >
    Map exposure/dosing data to SDTM EX domain. Handle EXTRT, EXDOSE, EXDOSU, EXDOSFRM, EXROUTE, timing,
    dose adjustment variables.
  skills_bound:
  - /sdtm-ex-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw exposure data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: EX domain (ex.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/ex.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.2
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - EXTRT matches protocol treatment names
    - Dose and unit variables populated
    recommended:
    - Dose adjustment reasons documented
  triggers:
  - EX
  - exposure
  - dosing
  - EX domain
  - EXTRT
  - EXDOSE
  - EXDOSU
  - EXDOSFRM
  - EXROUTE
  - study drug
  - study treatment
  - dose adjustment
  - drug exposure
  context_prompt: 'Map exposure/dosing data → SDTM EX (ex.xpt). Key vars: EXTRT, EXDOSE, EXDOSU, EXDOSFRM,
    EXROUTE, timing.'
- id: sdtm-ds-mapping
  name: SDTM DS Domain Mapping
  layer: 2
  description: >
    Map disposition data to SDTM DS domain. Handle DSTERM, DSDECOD, DSCAT, DSSCAT, EOSSTT (end of study
    status), DCSREAS (discontinuation reason). Critical for ADSL derivation of completion status.
  skills_bound:
  - /sdtm-ds-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw disposition data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: DS domain (ds.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/ds.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.2
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - EOSSTT populated for all subjects (COMPLETED, DISCONTINUED, ONGOING)
    - DCSREAS populated for discontinued subjects
    - DSCAT categorization consistent (DISPOSITION EVENT, PROTOCOL MILESTONE)
    recommended:
    - All protocol-specified milestones captured
  triggers:
  - DS
  - disposition
  - DS domain
  - DSTERM
  - DSDECOD
  - EOSSTT
  - end of study
  - discontinuation
  - DCSREAS
  - completed
  - withdrawn
  - screen failure
  - disposition event
  context_prompt: 'Map disposition data → SDTM DS (ds.xpt). Key vars: DSTERM, DSDECOD, EOSSTT, DCSREAS.
    Critical for ADSL derivation.'
- id: sdtm-sv-mapping
  name: SDTM SV Domain Mapping
  layer: 2
  description: >
    Map subject visits data to SDTM SV domain. Handle VISIT, VISITNUM, SVSTDTC, SVENDTC, SVUPDES (visit
    description). Essential for visit windowing in ADaM and subject-level analysis.
  skills_bound:
  - /sdtm-sv-mapper
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  inputs_required:
  - type: specification
    name: SDTM mapping specification
    format: xlsx|yaml
  - type: dataset
    name: Raw subject visits data
    format: csv|sas7bdat
  outputs_produced:
  - type: dataset
    name: SV domain (sv.xpt)
    format: xpt
    validation: p21-compliance
    path_pattern: output/sdtm/sv.xpt
  regulatory_refs:
  - CDISC SDTM IG v3.4 Section 6.3
  dependencies:
  - node: raw-data-validation
    edge_type: requires
  - node: spec-creation
    edge_type: requires
  evaluation_criteria:
    mandatory:
    - All protocol visits captured
    - VISITNUM in ascending order within subject
    - SVSTDTC in ISO 8601 format
    recommended:
    - Unscheduled visits flagged appropriately
  triggers:
  - SV
  - subject visits
  - visits
  - SV domain
  - VISIT
  - VISITNUM
  - SVSTDTC
  - SVENDTC
  - visit schedule
  - unscheduled visit
  - visit windowing
  context_prompt: 'Map subject visit data → SDTM SV (sv.xpt). Key vars: VISIT, VISITNUM, SVSTDTC, SVENDTC.
    Essential for ADaM visit windowing.'
- id: sdtm-trial-design
  name: SDTM Trial Design Domains
  layer: 2
  description: >
    Create FDA-required Trial Design datasets: TS (Trial Summary), TA (Trial Arms), TI (Trial Inclusion/Exclusion),
    TV (Trial Visits). These are metadata datasets describing study design, not patient data.
  skills_bound:
  - /sdtm-trial-design-builder
  - /sdtm-validator
  mcps_bound:
  - p21-validator
  - cdisc-library
  inputs_required:
  - type: document
    name: Study protocol
    format: pdf|docx
  - type: specification
    name: Study configuration
    format: yaml
  outputs_produced:
  - type: dataset
    name: TS domain (ts.xpt)
    format: xpt
